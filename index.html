<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourNa</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #eaeaea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .links a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      color: #eaeaea;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .links a:hover {
      background: #1a1a1a;
      border-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ar7ene</h1>
    <p>minimal presence on the internet</p>

    <div class="links">
      <a href="https://www.linkedin.com/in/ar7ene" target="_blank">LinkedIn</a>
      <a href="https://www.twiiter.com">Twitter</a>
      <a href="#">GitHub</a>
      <a href="#">Contact</a>
    </div>
  </div>
</body>
</html>
